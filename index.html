<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DRP Network Solutions - Generator QRIS Dinamis</title>
    <link rel="icon" type="image/png" href="images/qris.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-inner">
        <img src="images/logo_blue.webp" alt="Logo" class="logo" />
        <span class="site-title"
          >DRP Network Solutions - Generator QRIS Dinamis</span
        >
      </div>
    </header>
    <div class="container">
      <h1>Generator QRIS Dinamis</h1>
      <div class="input-section">
        <label>Tempel Kode QRIS Statis Anda Di Sini:</label>
        <textarea
          id="staticQris"
          rows="4"
          placeholder="Tempel kode QRIS statis di sini..."
        >00020101021126610014COM.GO-JEK.WWW01189360091434738682430210G4738682430303UMI51440014ID.CO.QRIS.WWW0215ID10254256669690303UMI5204737953033605802ID5921DRP Network Solutions6006KAMPAR61052841162070703A016304C82C</textarea>
        <label>Atau Unggah Gambar QRIS Di Sini:</label>
        <input type="file" id="qrImageInput" accept="image/*" />
        <label>Atau Pindai dari URL Gambar:</label>
        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
          <input type="url" id="qrImageUrl" placeholder="https://contoh.com/qr.jpg" style="flex: 1;" />
          <button id="parseUrlBtn" type="button" style="margin: 0; padding: 10px 15px; width: auto;">Scan URL</button>
        </div>
        <img
          id="qrPreview"
          style="
            display: none;
            max-width: 120px;
            margin: 10px 0;
            border-radius: 8px;
          "
        />
        <button id="parseBtn" type="button">Pindai QRIS dari Gambar</button>
        <label>Masukkan Nominal Di Sini:</label>
        <input
          type="number"
          id="amount"
          min="0"
          value="2000"          
        />
      </div>
      <div class="result-section" style="display: none">
        <h2>Hasil QRIS Dinamis Beserta Nominal</h2>
        <img id="qrImage" src="" alt="Kode QR QRIS" style="width: 200px" />
        <textarea id="dynamicQris" rows="4" readonly></textarea>
        <button id="copyBtn">Salin Kode QRIS</button>
        <a id="downloadBtn" href="#" download="qris.png">Unduh QRIS</a>
      </div>
    </div>
    <footer class="footer">
      <div class="footer-inner">
        <img src="images/logo_blue.webp" alt="Logo Footer" />
        <span>&copy; 2026 DRP Network Solutions</span>
        <span style="margin: 0 10px;">|</span>
        <a href="api-documentation.html" style="color: #6cf; text-decoration: none;">Dokumentasi API</a>
        <span style="margin: 0 10px;">|</span>
        <a href="https://dianrp.com" style="color: #6cf; text-decoration: none;">Owner</a>
      </div>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
